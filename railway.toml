# Prefer: set Railway Root Directory = "web" and deploy from web/.
# This root config is a fallback when Root Directory is empty.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["web/**"]

[deploy]
releaseCommand = "npx prisma db push"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
