# Used when Railway Root Directory = web
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["**"]

[deploy]
# Sync schema before traffic switches (also runs again via npm start)
releaseCommand = "npx prisma db push"
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
